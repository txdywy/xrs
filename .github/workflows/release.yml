name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: linux-64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: linux-64-musl
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: macos-64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: macos-arm64-v8a
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: windows-64
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            asset: windows-arm64-v8a
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/xrs dist/xrs
          cp README.md dist/README.md
          zip -j Xrs-${{ matrix.asset }}.zip dist/*
          shasum -a 256 Xrs-${{ matrix.asset }}.zip > Xrs-${{ matrix.asset }}.zip.sha256
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/${{ matrix.target }}/release/xrs.exe dist/xrs.exe
          Copy-Item README.md dist/README.md
          Compress-Archive -Path dist/* -DestinationPath Xrs-${{ matrix.asset }}.zip
          Get-FileHash Xrs-${{ matrix.asset }}.zip -Algorithm SHA256 | ForEach-Object { "$($_.Hash.ToLower())  Xrs-${{ matrix.asset }}.zip" } | Set-Content Xrs-${{ matrix.asset }}.zip.sha256
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          overwrite_files: true
          generate_release_notes: true
          files: |
            Xrs-${{ matrix.asset }}.zip
            Xrs-${{ matrix.asset }}.zip.sha256
